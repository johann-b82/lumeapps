version: 1
directus: 11.17.2
vendor: postgres

# v1.22 snapshot — collections + fields + relations only (per D-02).
# Policies, roles, and permissions stay in bootstrap-roles.sh.
# System settings are NOT captured here (env-specific).
#
# CRITICAL: schema: null per collection (not schema: {...} with a name).
# Using schema: {...} on existing Alembic-owned tables triggers Directus
# bug #25760 ("relation already exists"). With schema: null, Directus
# registers metadata-only and never tries to CREATE TABLE.
#
# Table names confirmed against backend/alembic/versions/v1_16_signage_schema.py:
# - signage_device_tags (NOT signage_tags)
# - signage_devices has NO tags column (tags live in signage_device_tag_map only)

collections:
  - collection: signage_devices
    meta:
      collection: signage_devices
      note: "Registered Pi kiosk devices. Calibration columns excluded from SSE WHEN clause — those use the FastAPI calibration-changed path."
      hidden: false
      singleton: false
    schema: null

  - collection: signage_playlists
    meta:
      collection: signage_playlists
      note: "Ordered media playlists. Admin-only write access."
      hidden: false
      singleton: false
    schema: null

  - collection: signage_playlist_items
    meta:
      collection: signage_playlist_items
      note: "Ordered items within a playlist. FK: playlist_id -> signage_playlists (CASCADE), media_id -> signage_media (RESTRICT)."
      hidden: false
      singleton: false
    schema: null

  - collection: signage_device_tags
    meta:
      collection: signage_device_tags
      note: "Tag labels for tag-based playlist routing (e.g., lobby, production)."
      hidden: false
      singleton: false
    schema: null

  - collection: signage_playlist_tag_map
    meta:
      collection: signage_playlist_tag_map
      note: "Join table: which tags a playlist targets. Composite PK (playlist_id, tag_id)."
      hidden: false
      singleton: false
    schema: null

  - collection: signage_device_tag_map
    meta:
      collection: signage_device_tag_map
      note: "Join table: which tags apply to which devices. Composite PK (device_id, tag_id)."
      hidden: false
      singleton: false
    schema: null

  - collection: signage_schedules
    meta:
      collection: signage_schedules
      note: "Time-based playlist schedules. Weekday bitmask + HHMM time window + priority."
      hidden: false
      singleton: false
    schema: null

  - collection: sales_records
    meta:
      collection: sales_records
      note: "ERP sales records uploaded by admins. 38-column fixed schema. Read-only for Viewers."
      hidden: false
      singleton: false
    schema: null

  - collection: personio_employees
    meta:
      collection: personio_employees
      note: "Personio employee roster synced by APScheduler. Read-only for Viewers."
      hidden: false
      singleton: false
    schema: null

  - collection: upload_batches
    meta:
      collection: upload_batches
      note: "ERP upload batch metadata. Written by FastAPI POST /api/upload (file parsing). Read by Admin + Viewer via Directus (v1.23 C-1)."
      hidden: false
      singleton: false
    schema: null

