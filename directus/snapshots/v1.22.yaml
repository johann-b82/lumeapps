# permissions/flows lives in the imperative bootstrap script — `directus
# schema apply` is collections+fields+relations only.
#
# This declarative block is documentation: it lets grep + reviewers see the
# Flow shape in one place, mirrors the fixed UUIDs used by the bootstrap
# script, and keeps the snapshot YAML idempotent (Directus 11 schema apply
# ignores unknown top-level keys; if a future Directus version begins
# capturing flows in snapshots, switch this to a real `flows:` /
